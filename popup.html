<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explain</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, #3f5d4f 0%, transparent 45%),
          radial-gradient(circle at bottom left, #5f3c2f 0%, transparent 40%),
          #161a17;
        color: #f4efe6;
        width: 340px;
        height: 220px;
        overflow: hidden;
        border-radius: 10px;
        border: 1px solid #3b473d;
        display: flex;
        flex-direction: column;
        user-select: none;
      }

      .header {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 10px 12px 8px;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid #3b473d;
        flex-shrink: 0;
      }

      .snippet {
        flex: 1;
        font-size: 11px;
        color: #c8b79d;
        font-style: italic;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.4;
        padding-top: 1px;
      }

      .close-btn, .speak-btn {
        background: none;
        border: none;
        color: #6c7563;
        font-size: 16px;
        cursor: pointer;
        line-height: 1;
        padding: 0 2px;
        flex-shrink: 0;
      }
      .close-btn:hover, .speak-btn:hover {
        color: #f4efe6;
      }
      .speak-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .speak-btn.speaking {
        color: #d6a45a;
      }

      .body {
        flex: 1;
        padding: 12px 14px;
        overflow-y: auto;
        display: flex;
        align-items: flex-start;
      }

      /* Custom scrollbar */
      .body::-webkit-scrollbar {
        width: 4px;
      }
      .body::-webkit-scrollbar-track {
        background: transparent;
      }
      .body::-webkit-scrollbar-thumb {
        background: #58695f;
        border-radius: 2px;
      }

      /* Spinner */
      .spinner {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #c8b79d;
        font-size: 12px;
      }
      .spinner svg {
        animation: spin 1s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Explanation text */
      .explanation {
        font-size: 13px;
        line-height: 1.6;
        color: #f4efe6;
        display: none;
      }

      /* Error */
      .error {
        font-size: 12px;
        color: #f2a392;
        display: none;
      }

      .footer {
        display: flex;
        justify-content: center;
        padding: 6px 12px 10px;
        border-top: 1px solid #3b473d;
        flex-shrink: 0;
      }

      .open-app-btn {
        background: linear-gradient(140deg, #3a463d, #304339);
        border: 1px solid #4e5f4f;
        color: #c8b79d;
        font-size: 11px;
        padding: 5px 14px;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.2s ease, color 0.2s ease;
      }
      .open-app-btn:hover {
        background: linear-gradient(140deg, #4a5a4d, #3a5345);
        color: #f4efe6;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="snippet" id="snippet">…</span>
      <button class="speak-btn" id="speakBtn" title="Read aloud" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>
      <button class="close-btn" id="closeBtn" title="Close">×</button>
    </div>
    <div class="body">
      <div class="spinner" id="spinner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle
            cx="12"
            cy="12"
            r="10"
            stroke="#3b473d"
            stroke-width="3"
            opacity="0.3"
          />
          <path
            d="M12 2a10 10 0 0 1 10 10"
            stroke="#d6a45a"
            stroke-width="3"
            stroke-linecap="round"
          />
        </svg>
        Explaining…
      </div>
      <div class="explanation" id="explanation"></div>
      <div class="error" id="error"></div>
    </div>
    <div class="footer">
      <button class="open-app-btn" id="openAppBtn">Open in Understory</button>
    </div>

    <script>
      const snippetEl = document.getElementById("snippet");
      const spinnerEl = document.getElementById("spinner");
      const explanationEl = document.getElementById("explanation");
      const errorEl = document.getElementById("error");
      const speakBtn = document.getElementById("speakBtn");

      document.getElementById("closeBtn").addEventListener("click", () => {
        window.popup.close();
      });

      let currentAudio = null;

      function stopAudio() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        speakBtn.classList.remove("speaking");
        speakBtn.disabled = false;
      }

      speakBtn.addEventListener("click", async () => {
        if (currentAudio) {
          stopAudio();
          return;
        }
        const text = explanationEl.textContent;
        if (!text) return;
        speakBtn.disabled = true;
        try {
          const base64 = await window.popup.speak(text);
          currentAudio = new Audio("data:audio/mp3;base64," + base64);
          currentAudio.onended = stopAudio;
          currentAudio.onerror = stopAudio;
          speakBtn.classList.add("speaking");
          speakBtn.disabled = false;
          currentAudio.play();
        } catch {
          stopAudio();
        }
      });

      document.getElementById("openAppBtn").addEventListener("click", () => {
        window.popup.openApp();
      });

      window.popup.onLoading((snippet) => {
        snippetEl.textContent = "\u201c" + snippet + "\u201d";
        spinnerEl.style.display = "flex";
        explanationEl.style.display = "none";
        errorEl.style.display = "none";
      });

      window.popup.onExplanation((text) => {
        spinnerEl.style.display = "none";
        explanationEl.style.display = "block";
        explanationEl.textContent = text;
        speakBtn.style.display = "inline-flex";
      });

      window.popup.onError((msg) => {
        spinnerEl.style.display = "none";
        errorEl.style.display = "block";
        errorEl.textContent = msg;
      });
    </script>
  </body>
</html>

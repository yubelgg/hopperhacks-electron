<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explain</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, #3f5d4f 0%, transparent 45%),
          radial-gradient(circle at bottom left, #5f3c2f 0%, transparent 40%),
          #161a17;
        color: #f4efe6;
        width: 340px;
        height: 220px;
        overflow: hidden;
        border-radius: 10px;
        border: 1px solid #3b473d;
        display: flex;
        flex-direction: column;
        user-select: none;
      }

      .header {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 10px 12px 8px;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid #3b473d;
        flex-shrink: 0;
      }

      .snippet {
        flex: 1;
        font-size: 11px;
        color: #c8b79d;
        font-style: italic;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.4;
        padding-top: 1px;
      }

      .close-btn {
        background: none;
        border: none;
        color: #6c7563;
        font-size: 16px;
        cursor: pointer;
        line-height: 1;
        padding: 0 2px;
        flex-shrink: 0;
      }
      .close-btn:hover {
        color: #f4efe6;
      }

      .body {
        flex: 1;
        padding: 12px 14px;
        overflow-y: auto;
        display: flex;
        align-items: flex-start;
      }

      /* Custom scrollbar */
      .body::-webkit-scrollbar {
        width: 4px;
      }
      .body::-webkit-scrollbar-track {
        background: transparent;
      }
      .body::-webkit-scrollbar-thumb {
        background: #58695f;
        border-radius: 2px;
      }

      /* Spinner */
      .spinner {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #c8b79d;
        font-size: 12px;
      }
      .spinner svg {
        animation: spin 1s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Explanation text */
      .explanation {
        font-size: 13px;
        line-height: 1.6;
        color: #f4efe6;
        display: none;
      }

      /* Error */
      .error {
        font-size: 12px;
        color: #f2a392;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="snippet" id="snippet">…</span>
      <button class="close-btn" id="closeBtn" title="Close">×</button>
    </div>
    <div class="body">
      <div class="spinner" id="spinner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle
            cx="12"
            cy="12"
            r="10"
            stroke="#3b473d"
            stroke-width="3"
            opacity="0.3"
          />
          <path
            d="M12 2a10 10 0 0 1 10 10"
            stroke="#d6a45a"
            stroke-width="3"
            stroke-linecap="round"
          />
        </svg>
        Explaining…
      </div>
      <div class="explanation" id="explanation"></div>
      <div class="error" id="error"></div>
    </div>

    <script>
      const snippetEl = document.getElementById("snippet");
      const spinnerEl = document.getElementById("spinner");
      const explanationEl = document.getElementById("explanation");
      const errorEl = document.getElementById("error");

      document.getElementById("closeBtn").addEventListener("click", () => {
        window.popup.close();
      });

      window.popup.onLoading((snippet) => {
        snippetEl.textContent = "\u201c" + snippet + "\u201d";
        spinnerEl.style.display = "flex";
        explanationEl.style.display = "none";
        errorEl.style.display = "none";
      });

      window.popup.onExplanation((text) => {
        spinnerEl.style.display = "none";
        explanationEl.style.display = "block";
        explanationEl.textContent = text;
      });

      window.popup.onError((msg) => {
        spinnerEl.style.display = "none";
        errorEl.style.display = "block";
        errorEl.textContent = msg;
      });
    </script>
  </body>
</html>
